<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Links - فضاء الأفكار</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>    <!-- Data Controls -->
    <div id="data-controls" style="position: absolute; top: 15px; left: 15px; z-index: 1000; display: flex; gap: 10px;">
        <button id="export-btn" class="glass-btn" title="حفظ أفكاري كملف"><i class="fas fa-download"></i> تصدير (حفظ)</button>
        <button id="import-btn" class="glass-btn" title="استرجاع أفكاري من ملف"><i class="fas fa-upload"></i> استيراد (رفع)</button>
        <input type="file" id="import-file" style="display: none;" accept=".json">
    </div>

    <!-- 3D Parallax Space Canvas -->
    <canvas id="space-canvas"></canvas>
    
    <!-- Infinite Pan/Zoom Container -->
    <div id="workspace-container">
        <div id="workspace">
            <div id="nodes-layer"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
